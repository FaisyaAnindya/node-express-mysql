name: Node.js 4-Stage Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: npm install
  test:
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Run Unit Tests
        run: |
          # npm test 
          echo "Testing completed successfully!"
  release:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Create Release Artifact
        run: |
          echo "Membuat artifact untuk versi: ${{ github.sha }}"
          tar -czf release-${{ github.sha }}.tar.gz app server.js package.json
          mkdir -p artifacts
          mv release-${{ github.sha }}.tar.gz artifacts/
  deploy:
    needs: release
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Application
        run: |
          echo "Deploying to production environment..."
          tar -xzf artifacts/release-${{ github.sha }}.tar.gz -C . || true
          npm install --production
          pm2 delete node-app || true
          pm2 start server.js --name node-app
          pm2 save
