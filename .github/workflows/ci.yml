name: Node.js 4-Stage Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: npm install

  test:
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Run Unit Tests
        run: echo "Testing completed successfully!"

  release:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Create Release Artifact
        run: |
          tar -czf release-app.tar.gz app server.js package.json package-lock.json
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: release-app.tar.gz

  deploy:
    needs: release
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-bundle
      - name: Deploy Application
        run: |
          tar -xzf release-app.tar.gz -C .
          npm install --production
          pm2 delete node-app || true
          pm2 start server.js --name node-app
          pm2 save
